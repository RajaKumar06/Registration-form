<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        .container {
            width: 450px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .gender input {
            width: auto;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }

        .output {
            margin-top: 20px;
            background: #eef;
            padding: 10px;
        }
    </style>
</head>

<body ng-controller="myCtrl">

<div class="container">

    <h2>Registration Form</h2>

    <form ng-submit="submitForm()">

        <label>Name</label>
        <input type="text" ng-model="user.name" required>

        <label>Father's Name</label>
        <input type="text" ng-model="user.father" required>

        <label>Mother's Name</label>
        <input type="text" ng-model="user.mother" required>

        <label>Gender</label>
        <div class="gender">
            <input type="radio" ng-model="user.gender" value="Male"> Male
            <input type="radio" ng-model="user.gender" value="Female"> Female
            <input type="radio" ng-model="user.gender" value="Other"> Other
        </div>

        <label>Date of Birth</label>
        <input type="date" ng-model="user.dob" required>

        <label>Email</label>
        <input type="email" ng-model="user.email" required>

        <label>Select District</label>
        <select ng-model="user.district" ng-options="d for d in districts" required>
            <option value="">--Select District--</option>
        </select>

        <label>Select Year</label>
        <select ng-model="user.year" ng-options="y for y in years" required>
            <option value="">--Select Year--</option>
        </select>

        <button type="submit">Submit</button>

    </form>

    <div class="output" ng-if="submitted">
        <h3>Submitted Details</h3>
        <p><b>Name:</b> {{user.name}}</p>
        <p><b>Father's Name:</b> {{user.father}}</p>
        <p><b>Mother's Name:</b> {{user.mother}}</p>
        <p><b>Gender:</b> {{user.gender}}</p>
        <p><b>Date of Birth:</b> {{user.dob | date:'dd/MM/yyyy'}}</p>
        <p><b>Email:</b> {{user.email}}</p>
        <p><b>District:</b> {{user.district}}</p>
        <p><b>Year:</b> {{user.year}}</p>
    </div>

</div>

<script>
var app = angular.module("myApp", []);

app.controller("myCtrl", function($scope){

    $scope.districts = [
        "Muzaffarpur",
        "Patana",
        "Sitamarhi",
        "Samastipur",
        "Bhagalpur",
    ];

    $scope.years = [
        "2025",
        "2026",
        "2027",
        "2028",
        "2029"
    ];

    $scope.submitForm = function(){
        $scope.submitted = true;
        alert("Registration Submitted Successfully!");
    };

});
</script>

</body>
</html>
